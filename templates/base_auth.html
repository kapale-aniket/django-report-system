{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2d5a47">
  <title>{% block title %}Sign in{% endblock %} · ReportFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'css/mobile.css' %}">
  <link rel="stylesheet" href="{% static 'css/terra.css' %}">
  <link rel="stylesheet" href="{% static 'css/auth_portal.css' %}">
  <link rel="stylesheet" href="{% static 'css/toast.css' %}">
  <link rel="stylesheet" href="{% static 'css/loader.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body class="app-body auth-portal-page terra-theme">
  {% include 'partials/toast_stack.html' %}
  {% include 'partials/app_loader.html' %}
  {% block outer %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/toast.js' %}"></script>
  <script src="{% static 'js/loader.js' %}"></script>
  <script src="{% static 'js/required_field_labels.js' %}"></script>
  <script src="{% static 'js/dashboard.js' %}"></script>
  <script src="{% static 'js/password_toggle.js' %}"></script>
  <script src="{% static 'js/api_client.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
