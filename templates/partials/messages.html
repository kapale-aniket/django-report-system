{% if messages %}
<script type="application/json" class="rf-flash-messages">[
{% for message in messages %}
  {"text": "{{ message|escapejs }}", "type": "{% if 'error' in message.tags %}error{% elif 'success' in message.tags %}success{% elif 'warning' in message.tags %}warning{% else %}info{% endif %}"}{% if not forloop.last %},{% endif %}
{% endfor %}
]</script>
{% endif %}
