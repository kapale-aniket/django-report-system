{% extends 'base_auth.html' %}
{% block title %}Password updated{% endblock %}
{% block outer %}
<div class="auth-shell auth-shell--narrow">
  {% include 'partials/auth_topbar.html' %}
  <div class="auth-card-portal p-4 p-md-5">
    <div class="text-center mb-4">
      <div class="auth-brand-mark mx-auto mb-3">RF</div>
      <span class="auth-role-pill mb-2 d-inline-flex"><i class="bi bi-check-circle" aria-hidden="true"></i> Success</span>
      <h1 class="auth-portal-title h4 fw-bold mb-2">Password changed</h1>
      <p class="auth-lead small mb-0">Your new password is saved. You can sign in with it now.</p>
    </div>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 auth-submit-btn">Go to sign in</a>
    <p class="text-center small auth-lead mt-4 mb-0">
      <a href="{% url 'dashboard:landing' %}" class="text-decoration-none" style="color: var(--ap-muted);">Back to home</a>
    </p>
  </div>
</div>
{% endblock %}
