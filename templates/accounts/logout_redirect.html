{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Signing out… · ReportFlow</title>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; text-align: center; margin-top: 3rem; color: #555;">
    Signing you out…
  </p>
  <script src="{% static 'js/api_client.js' %}"></script>
  <script>
    (function () {
      if (window.ReportFlowAPI && window.ReportFlowAPI.clearTokens) {
        window.ReportFlowAPI.clearTokens();
      } else {
        try {
          localStorage.removeItem('rf_access_token');
          localStorage.removeItem('rf_refresh_token');
        } catch (e) { /* ignore */ }
      }
      window.location.replace('{% url "dashboard:landing" %}?signed_out=1');
    })();
  </script>
</body>
</html>
